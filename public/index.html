<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="ScanPC">
<meta name="theme-color" content="#0d0d0d">
<link rel="manifest" href="/manifest.json">
<title>ScanPC</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Barlow:wght@400;600;700&display=swap');

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #0d0d0d;
  --surface:  #161616;
  --surface2: #202020;
  --border:   #2e2e2e;
  --accent:   #f0c040;
  --green:    #2ecc71;
  --red:      #e74c3c;
  --orange:   #e67e22;
  --text:     #f0f0f0;
  --dim:      #666;
  --mono:     'Share Tech Mono', monospace;
  --sans:     'Barlow', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow: hidden;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

#app {
  display: flex;
  flex-direction: column;
  height: 100dvh;
  max-width: 480px;
  margin: 0 auto;
}

/* ── HEADER ─────────────────────────────────────────────────────── */
header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.brand { display: flex; align-items: center; gap: 10px; }
.brand-hex {
  width: 30px; height: 30px;
  background: var(--accent);
  clip-path: polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);
  flex-shrink: 0;
}
.brand-name { font-family: var(--mono); font-size: 15px; letter-spacing: 2px; color: var(--accent); }
.pill {
  display: flex; align-items: center; gap: 5px;
  padding: 5px 10px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  transition: all .3s;
}
.pill.on { color: var(--green); border-color: var(--green); }
.pill-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

/* ── SETUP ──────────────────────────────────────────────────────── */
#setup {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 32px 24px; gap: 22px;
}
.s-icon { font-size: 50px; }
.s-title { font-size: 22px; font-weight: 700; text-align: center; }
.s-sub { font-size: 13px; color: var(--dim); text-align: center; line-height: 1.6; font-family: var(--mono); }
.field { width: 100%; display: flex; flex-direction: column; gap: 6px; }
.field label { font-family: var(--mono); font-size: 10px; color: var(--dim); letter-spacing: 1px; }
.field input {
  width: 100%; padding: 13px 15px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; color: var(--text);
  font-family: var(--sans); font-size: 15px; outline: none;
  transition: border-color .2s;
}
.field input:focus { border-color: var(--accent); }
.change-name {
  font-size: 11px; color: var(--dim); text-align: right;
  cursor: pointer; text-decoration: underline;
  display: none;
}
.btn-start {
  width: 100%; padding: 15px; border: none; border-radius: 8px;
  background: var(--accent); color: #0d0d0d;
  font-family: var(--sans); font-size: 16px; font-weight: 700;
  cursor: pointer; letter-spacing: 0.3px;
  transition: transform .1s, opacity .2s;
}
.btn-start:active { transform: scale(.98); opacity: .9; }

/* ── MAIN APP ───────────────────────────────────────────────────── */
#main { flex: 1; display: none; flex-direction: column; overflow: hidden; }
#main.show { display: flex; }

/* PC bar */
.pc-bar {
  display: flex; align-items: center; gap: 8px;
  padding: 6px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border);
  font-family: var(--mono); font-size: 10px; color: var(--dim);
  flex-shrink: 0;
}
.pc-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--dim); }
.pc-dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }

/* Camera view */
#camView {
  position: relative; background: #000;
  overflow: hidden; flex-shrink: 0;
  display: none;
}
#camView.show { display: block; }
#video { width: 100%; display: block; object-fit: cover; }
#canvas { display: none; }

/* Mirino */
.vf {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
  pointer-events: none;
}
.vf-box { width: 240px; height: 160px; position: relative; }
.vf-c {
  position: absolute; width: 28px; height: 28px;
  border-color: var(--accent); border-style: solid; opacity: .9;
}
.vf-c.tl { top:0; left:0;  border-width: 3px 0 0 3px; }
.vf-c.tr { top:0; right:0; border-width: 3px 3px 0 0; }
.vf-c.bl { bottom:0; left:0;  border-width: 0 0 3px 3px; }
.vf-c.br { bottom:0; right:0; border-width: 0 3px 3px 0; }
.vf-line {
  position: absolute; left: 10px; right: 10px; height: 2px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
  box-shadow: 0 0 8px var(--accent);
  top: 10px;
}
.vf-line.animate { animation: scanLine 1.2s ease-in-out infinite; }
@keyframes scanLine {
  0%   { top: 10px; }
  50%  { top: calc(100% - 12px); }
  100% { top: 10px; }
}
.vf-flash {
  position: absolute; inset: 0;
  background: var(--accent); opacity: 0;
  pointer-events: none; transition: opacity .06s;
}
.vf-flash.on { opacity: .35; }
.vf-chip {
  position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
  background: rgba(0,0,0,.8); backdrop-filter: blur(8px);
  border: 1px solid var(--accent); border-radius: 6px;
  padding: 6px 14px; font-family: var(--mono); font-size: 12px; color: var(--accent);
  white-space: nowrap; max-width: 90%; overflow: hidden; text-overflow: ellipsis;
  opacity: 0; transition: opacity .2s; pointer-events: none;
}
.vf-chip.show { opacity: 1; }

/* Scan button area */
#scanArea {
  display: flex; flex-direction: column; align-items: center;
  padding: 16px; gap: 10px;
  background: var(--surface); border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.btn-scan {
  width: 100%; max-width: 340px; padding: 16px;
  border: none; border-radius: 9px;
  background: var(--accent); color: #0d0d0d;
  font-family: var(--sans); font-size: 16px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px;
  transition: transform .1s, opacity .15s;
}
.btn-scan:active { transform: scale(.98); }
.btn-scan.stop { background: var(--red); color: #fff; }
.scan-hint { font-family: var(--mono); font-size: 10px; color: var(--dim); text-align: center; }

/* Toolbar */
.toolbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px; background: var(--surface);
  border-bottom: 1px solid var(--border); flex-shrink: 0;
}
.counter { font-family: var(--mono); font-size: 12px; color: var(--dim); }
.counter b { color: var(--accent); font-size: 15px; }
.t-actions { display: flex; gap: 7px; }
.tbtn {
  padding: 6px 11px; border-radius: 6px;
  border: 1px solid var(--border); background: var(--surface2);
  color: var(--text); font-family: var(--mono); font-size: 11px;
  cursor: pointer; transition: transform .1s;
  white-space: nowrap;
}
.tbtn:active { transform: scale(.95); }
.tbtn.red { border-color: var(--red); color: var(--red); }
.tbtn:disabled { opacity: .3; cursor: default; transform: none; }

/* Lista */
#list {
  flex: 1; overflow-y: auto;
  padding: 10px 12px;
  display: flex; flex-direction: column; gap: 6px;
}
#list::-webkit-scrollbar { width: 3px; }
#list::-webkit-scrollbar-thumb { background: var(--border); }

.empty {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 10px; color: var(--dim); text-align: center; padding: 20px;
}
.empty .ico { font-size: 36px; opacity: .2; }
.empty p { font-size: 13px; line-height: 1.6; font-family: var(--mono); }

.item {
  display: flex; align-items: center; gap: 10px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 10px 12px;
  animation: slideIn .15s ease;
}
@keyframes slideIn { from { opacity:0; transform:translateX(-6px); } to { opacity:1; transform:none; } }
.item-n { font-family: var(--mono); font-size: 10px; color: var(--dim); width: 20px; text-align: right; flex-shrink: 0; }
.badge {
  font-family: var(--mono); font-size: 9px; padding: 2px 6px;
  border-radius: 3px; border: 1px solid var(--border);
  background: var(--surface); color: var(--dim); flex-shrink: 0;
}
.badge.qr     { border-color: #3a9df8; color: #3a9df8; }
.badge.ean    { border-color: var(--orange); color: var(--orange); }
.badge.code   { border-color: #a855f7; color: #a855f7; }
.item-val {
  flex: 1; font-family: var(--mono); font-size: 13px;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.item-time { font-family: var(--mono); font-size: 9px; color: var(--dim); flex-shrink: 0; }
.item-del {
  width: 22px; height: 22px; border: none; background: none;
  color: var(--dim); font-size: 16px; cursor: pointer;
  border-radius: 4px; display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; transition: color .15s;
}
.item-del:active { color: var(--red); }

/* Send bar */
.send-bar {
  padding: 10px 12px; background: var(--surface);
  border-top: 1px solid var(--border); flex-shrink: 0;
}
.btn-send {
  width: 100%; padding: 14px; border: none; border-radius: 8px;
  background: var(--accent); color: #0d0d0d;
  font-family: var(--sans); font-size: 15px; font-weight: 700;
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: transform .1s;
}
.btn-send:active { transform: scale(.98); }
.btn-send:disabled { background: var(--border); color: var(--dim); cursor: default; transform: none; }

/* Toast */
#toast {
  position: fixed; bottom: 84px; left: 50%; transform: translateX(-50%);
  background: #1a1a1a; border: 1px solid var(--border); border-radius: 8px;
  padding: 10px 18px; font-family: var(--mono); font-size: 12px;
  white-space: nowrap; pointer-events: none;
  opacity: 0; transition: opacity .2s; z-index: 99;
}
#toast.show { opacity: 1; }
#toast.ok   { border-color: var(--green);  color: var(--green);  }
#toast.err  { border-color: var(--red);    color: var(--red);    }
#toast.warn { border-color: var(--accent); color: var(--accent); }
</style>
</head>
<body>
<div id="app">

  <header>
    <div class="brand">
      <div class="brand-hex"></div>
      <span class="brand-name">SCANPC</span>
    </div>
    <div class="pill" id="pill">
      <div class="pill-dot"></div>
      <span id="pillLabel">offline</span>
    </div>
  </header>

  <!-- SETUP -->
  <div id="setup">
    <div class="s-icon">📷</div>
    <div class="s-title">Scanner QR &amp; Barcode</div>
    <div class="s-sub">Scansiona codici con la fotocamera<br>e inviali al PC</div>
    <div class="field">
      <label>NOME DISPOSITIVO</label>
      <input type="text" id="nameInput" placeholder="es. Scanner-1" maxlength="24">
      <span class="change-name" id="changeName" onclick="clearName()">non sono io →</span>
    </div>
    <button class="btn-start" onclick="startApp()">Avvia →</button>
  </div>

  <!-- MAIN -->
  <div id="main">

    <div class="pc-bar">
      <div class="pc-dot" id="pcDot"></div>
      <span id="pcLabel">PC offline</span>
    </div>

    <!-- Fotocamera -->
    <div id="camView">
      <video id="video" autoplay playsinline muted></video>
      <canvas id="canvas"></canvas>
      <div class="vf">
        <div class="vf-box">
          <div class="vf-c tl"></div><div class="vf-c tr"></div>
          <div class="vf-c bl"></div><div class="vf-c br"></div>
          <div class="vf-line" id="vfLine"></div>
        </div>
      </div>
      <div class="vf-flash" id="vfFlash"></div>
      <div class="vf-chip"  id="vfChip"></div>
    </div>

    <!-- Tasto scan -->
    <div id="scanArea">
      <button class="btn-scan" id="btnScan" onclick="toggleScan()">
        <span id="btnIcon">📷</span>
        <span id="btnLabel">Scansiona codice</span>
      </button>
      <div class="scan-hint" id="scanHint">Premi per aprire la fotocamera</div>
    </div>

    <!-- Toolbar -->
    <div class="toolbar">
      <div class="counter">Lista: <b id="countLabel">0</b></div>
      <div class="t-actions">
        <button class="tbtn" id="btnDup" onclick="toggleDupes()">no dup: ON</button>
        <button class="tbtn red" id="btnClear" onclick="clearList()" disabled>svuota</button>
      </div>
    </div>

    <!-- Lista -->
    <div id="list">
      <div class="empty" id="emptyMsg">
        <div class="ico">▦</div>
        <p>Nessun codice scansionato.<br>Premi il tasto sopra per iniziare.</p>
      </div>
    </div>

    <!-- Invia -->
    <div class="send-bar">
      <button class="btn-send" id="btnSend" onclick="sendToPC()" disabled>
        <span>📤</span><span id="sendLabel">Invia al PC</span>
      </button>
    </div>

  </div>
</div>

<div id="toast"></div>

<!-- Librerie scanner -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@ericblade/quagga2@1.8.4/dist/quagga.min.js"></script>

<script>
'use strict';

// ── Stato globale ─────────────────────────────────────────────────────────────
let ws          = null;
let myName      = '';
let pcOnline    = false;
let codes       = [];
let skipDupes   = true;
let isScanning  = false;
let stream      = null;
let rafId       = null;
let quaggaTimer = null;
let quaggaBusy  = false;
let lastVal     = '';
let lastTime    = 0;
const DEBOUNCE  = 1500;

// ── Helpers DOM ───────────────────────────────────────────────────────────────
const $  = id => document.getElementById(id);
const esc = s => String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');

let toastTimer;
function toast(msg, type = '') {
  const t = $('toast');
  t.textContent = msg;
  t.className = 'show ' + type;
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.className = '', 3000);
}

// ── Setup ─────────────────────────────────────────────────────────────────────
function clearName() {
  localStorage.removeItem('scanpc_name');
  $('nameInput').value = '';
  $('changeName').style.display = 'none';
}

function startApp() {
  myName = ($('nameInput').value || '').trim() || 'Scanner';
  localStorage.setItem('scanpc_name', myName);
  $('setup').style.display = 'none';
  $('main').classList.add('show');
  connectWS();
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connectWS() {
  try {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(`${proto}//${location.host}?type=scanner&name=${encodeURIComponent(myName)}`);

    ws.onopen = () => {
      $('pill').classList.add('on');
      $('pillLabel').textContent = 'connesso';
    };

    ws.onmessage = e => {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'status') {
          pcOnline = !!msg.pcConnected;
          $('pcDot').classList.toggle('on', pcOnline);
          $('pcLabel').textContent = pcOnline ? 'PC connesso' : 'PC offline';
        }
        if (msg.type === 'batch_ack') toast(`✓ ${msg.count} codici ricevuti dal PC`, 'ok');
        if (msg.type === 'error')     toast('⚠ ' + msg.message, 'err');
      } catch (ex) { /* ignore */ }
    };

    ws.onclose = () => {
      $('pill').classList.remove('on');
      $('pillLabel').textContent = 'offline';
      setTimeout(connectWS, 4000);
    };

    ws.onerror = () => {
      $('pill').classList.remove('on');
      $('pillLabel').textContent = 'offline';
    };

  } catch (ex) {
    console.warn('WS error:', ex);
    setTimeout(connectWS, 4000);
  }
}

// ── Camera ────────────────────────────────────────────────────────────────────
async function toggleScan() {
  if (isScanning) stopCamera();
  else            await openCamera();
}

async function openCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: {
        facingMode: { ideal: 'environment' },
        width:  { ideal: 1280 },
        height: { ideal: 720 }
      }
    });

    const video = $('video');
    video.srcObject = stream;
    await video.play();

    const cv = $('camView');
    cv.style.height = Math.round(window.innerHeight * 0.36) + 'px';
    cv.classList.add('show');
    $('vfLine').classList.add('animate');

    isScanning = true;
    lastVal = ''; lastTime = 0;

    $('btnScan').classList.add('stop');
    $('btnIcon').textContent  = '⏹';
    $('btnLabel').textContent = 'Stop scansione';
    $('scanHint').textContent  = 'Inquadra QR o barcode…';

    startJsQR();
    startQuagga();

  } catch (err) {
    toast('⚠ Fotocamera: ' + err.message, 'err');
  }
}

function stopCamera() {
  isScanning = false;

  if (rafId)       { cancelAnimationFrame(rafId); rafId = null; }
  if (quaggaTimer) { clearInterval(quaggaTimer);  quaggaTimer = null; }
  quaggaBusy = false;

  if (stream) { stream.getTracks().forEach(t => t.stop()); stream = null; }

  $('video').srcObject = null;
  $('camView').classList.remove('show');
  $('vfLine').classList.remove('animate');

  $('btnScan').classList.remove('stop');
  $('btnIcon').textContent  = '📷';
  $('btnLabel').textContent = 'Scansiona codice';
  $('scanHint').textContent  = 'Premi per aprire la fotocamera';
}

// ── Motore 1: jsQR (QR code) ──────────────────────────────────────────────────
function startJsQR() {
  const video  = $('video');
  const canvas = $('canvas');
  const ctx    = canvas.getContext('2d', { willReadFrequently: true });

  function tick() {
    if (!isScanning) return;

    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

      // Prova normale (landscape)
      let id = ctx.getImageData(0, 0, canvas.width, canvas.height);
      let qr = jsQR(id.data, id.width, id.height, { inversionAttempts: 'dontInvert' });
      if (qr && qr.data) { onDetected(qr.data, 'QR'); return; }

      // Prova ruotato 90° (portrait)
      const r   = rotateCanvas(canvas, 90);
      const rc  = r.getContext('2d');
      id = rc.getImageData(0, 0, r.width, r.height);
      qr = jsQR(id.data, id.width, id.height, { inversionAttempts: 'dontInvert' });
      if (qr && qr.data) { onDetected(qr.data, 'QR'); return; }
    }

    rafId = requestAnimationFrame(tick);
  }
  rafId = requestAnimationFrame(tick);
}

// ── Motore 2: Quagga2 (barcode 1D) ogni 400ms ────────────────────────────────
function startQuagga() {
  quaggaTimer = setInterval(() => {
    if (!isScanning || quaggaBusy) return;

    const canvas = $('canvas');
    if (!canvas.width) return;

    quaggaBusy = true;

    const tryDecode = (src, cb) => {
      Quagga.decodeSingle({
        src,
        numOfWorkers: 0,
        inputStream: { size: 800 },
        locator: { patchSize: 'medium', halfSample: true },
        decoder: {
          readers: [
            'ean_reader', 'ean_8_reader',
            'upc_reader', 'upc_e_reader',
            'code_128_reader', 'code_39_reader',
            'code_93_reader', 'codabar_reader', 'i2of5_reader'
          ]
        },
        locate: true
      }, cb);
    };

    // Tentativo 1: frame normale (barcode orizzontale)
    tryDecode(canvas.toDataURL('image/jpeg', 0.85), r1 => {
      if (r1 && r1.codeResult && r1.codeResult.code) {
        quaggaBusy = false;
        onDetected(r1.codeResult.code, fmt(r1.codeResult.format));
        return;
      }
      if (!isScanning) { quaggaBusy = false; return; }

      // Tentativo 2: frame ruotato 90° (barcode verticale — telefono in portrait)
      const rot = rotateCanvas(canvas, 90);
      tryDecode(rot.toDataURL('image/jpeg', 0.85), r2 => {
        quaggaBusy = false;
        if (r2 && r2.codeResult && r2.codeResult.code) {
          onDetected(r2.codeResult.code, fmt(r2.codeResult.format));
        }
      });
    });

  }, 400);
}

// ── Utilità ───────────────────────────────────────────────────────────────────
function rotateCanvas(src, deg) {
  const w = src.width, h = src.height;
  const c = document.createElement('canvas');
  if (deg === 90 || deg === 270) { c.width = h; c.height = w; }
  else { c.width = w; c.height = h; }
  const ctx = c.getContext('2d');
  ctx.translate(c.width / 2, c.height / 2);
  ctx.rotate(deg * Math.PI / 180);
  ctx.drawImage(src, -w / 2, -h / 2);
  return c;
}

function fmt(f) {
  if (!f) return 'BARCODE';
  const m = { ean_13:'EAN13', ean_8:'EAN8', upc_a:'UPC-A', upc_e:'UPC-E', code_128:'CODE128', code_39:'CODE39', code_93:'CODE93', codabar:'CODABAR', i2of5:'ITF' };
  return m[f.toLowerCase()] || f.toUpperCase().slice(0, 8);
}

// ── Codice rilevato ───────────────────────────────────────────────────────────
function onDetected(value, type) {
  if (!value) return;
  const now = Date.now();
  if (value === lastVal && now - lastTime < DEBOUNCE) return;
  lastVal  = value;
  lastTime = now;

  if (skipDupes && codes.some(c => c.value === value)) {
    toast('Duplicato: ' + value, 'warn');
    stopCamera();
    return;
  }

  // Flash + vibra
  const fl = $('vfFlash');
  fl.classList.add('on');
  setTimeout(() => fl.classList.remove('on'), 130);
  if (navigator.vibrate) navigator.vibrate(80);

  // Chip
  const chip = $('vfChip');
  chip.textContent = '✓ ' + value;
  chip.classList.add('show');
  clearTimeout(chip._t);
  chip._t = setTimeout(() => chip.classList.remove('show'), 2000);

  // Aggiunge alla lista e chiude fotocamera
  codes.unshift({ value, type, time: new Date() });
  stopCamera();
  renderList();
  updateButtons();
}

// ── Lista ─────────────────────────────────────────────────────────────────────
function renderList() {
  const container = $('list');
  [...container.children].forEach(el => { if (el.id !== 'emptyMsg') el.remove(); });
  $('emptyMsg').style.display = codes.length ? 'none' : 'flex';

  codes.forEach((c, i) => {
    const t  = c.type.toLowerCase().replace(/[^a-z0-9]/g, '');
    const bc = t === 'qr' ? 'qr' : (t.startsWith('ean') || t.startsWith('upc')) ? 'ean' : 'code';
    const div = document.createElement('div');
    div.className = 'item';
    div.innerHTML = `
      <div class="item-n">${codes.length - i}</div>
      <div class="badge ${bc}">${c.type}</div>
      <div class="item-val" title="${esc(c.value)}">${esc(c.value)}</div>
      <div class="item-time">${c.time.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit',second:'2-digit'})}</div>
      <button class="item-del" onclick="removeCode(${i})">×</button>`;
    container.appendChild(div);
  });
  $('countLabel').textContent = codes.length;
}

function removeCode(i) { codes.splice(i, 1); renderList(); updateButtons(); }
function clearList()   { codes = [];         renderList(); updateButtons(); }

function updateButtons() {
  const has = codes.length > 0;
  $('btnClear').disabled = !has;
  $('btnSend').disabled  = !has;
  $('sendLabel').textContent = has ? `Invia ${codes.length} codice/i al PC` : 'Invia al PC';
}

function toggleDupes() {
  skipDupes = !skipDupes;
  $('btnDup').textContent = `no dup: ${skipDupes ? 'ON' : 'OFF'}`;
}

// ── Invia al PC ───────────────────────────────────────────────────────────────
function sendToPC() {
  if (!ws || ws.readyState !== 1) { toast('⚠ Non connesso al server', 'warn'); return; }
  if (!pcOnline)                  { toast('⚠ PC non connesso', 'warn'); return; }
  if (!codes.length)              { return; }

  ws.send(JSON.stringify({
    type:   'scan_batch',
    device: myName,
    total:  codes.length,
    codes:  codes.map(c => ({ value: c.value, barcode_type: c.type, scanned_at: c.time.toISOString() }))
  }));

  toast(`📤 Invio ${codes.length} codice/i…`, 'warn');
  setTimeout(() => { codes = []; renderList(); updateButtons(); }, 500);
}

// ── Init ──────────────────────────────────────────────────────────────────────
(() => {
  const saved = localStorage.getItem('scanpc_name');
  if (saved) {
    $('nameInput').value = saved;
    $('changeName').style.display = 'block';
  }
})();
</script>
</body>
